services:
  # 1. Backend: FastAPI AI Service
  - type: web
    name: questgen-api
    runtime: docker
    dockerContext: ai-service
    envVars:
      - key: MONGO_URI
        sync: false # Set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false # Set manually in Render dashboard
      - key: PORT
        value: 8000
    healthCheckPath: /

  # 2. Frontend: React Application
  - type: static
    name: questgen-ui
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_AI_SERVICE_URL
        fromService:
          type: web
          name: questgen-api
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
