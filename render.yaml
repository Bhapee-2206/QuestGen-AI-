services:
  # Combined App: Both Frontend and Backend on one URL
  - type: web
    name: questgen-ai
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 8000
    healthCheckPath: /api/health
